<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#d6007f">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { font-family: sans-serif; }

#status {
  margin-bottom: 15px;
  font-weight: bold;
}

#container {
  display: grid;
  grid-template-columns: repeat(auto-fill, 110px);
  gap: 10px;
}

.station {
  width: 100px;
  text-align: center;       /* 下に文字をそろえる */
  margin: 0 auto;
}

.stamp-image {
  width: 100px;
  aspect-ratio: 1 / 1;
  background-size: cover;
  background-position: center;
  border: 2px dashed #ccc;
  border-radius: 15px;
  margin-bottom: 5px;       /* 文字との間 */
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.stamp-image:hover {
  transform: scale(1.12);
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.stamp-label {
  font-size: 12px;
  word-wrap: break-word;
}

.unlocked {
  border: 2px solid #4CAF50;
}

@media (max-width:768px){

  #container{
    grid-template-columns: repeat(3, 1fr);
    gap:16px;
  }

  .station{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .stamp-image{
    width:100%;
    aspect-ratio:1/1;
  }

  .stamp-label{
    font-size:14px;
  }

}

</style>
</head>
<body>

<h1>駅一覧</h1>
<div id="status"></div>
<div id="sub"></div>
<div id="container"></div>

<script>
const params = new URLSearchParams(window.location.search);
const targetLine = "京王電鉄"; // ここは固定でOK

async function loadLines() {
  const response = await fetch("lines.json");
  const lineTitles = await response.json();
  const h1 = document.querySelector("h1");
  h1.textContent = lineTitles[targetLine] || "京王電鉄";
  const container = document.getElementById("container");
  const sub = document.createElement("div");
    sub.textContent = "京王線";
    sub.style.gridColumn = "1 / -1"; // 全幅にまたがる
    sub.style.textAlign = "left";
    sub.style.fontWeight = "bold";
    sub.style.margin = "10px 0";
    container.appendChild(sub);
}

async function loadStations() {
  const response = await fetch("stations.json", { cache: "no-store" });
  const stations = await response.json();

const order = ["笹塚", "仙川", "つつじヶ丘", "柴崎", "国領", "布田", "調布", "西調布", "飛田給", "府中", "聖蹟桜ヶ丘", "山田", "多摩動物公園", "京王多摩川", "京王よみうりランド", "南大沢", "池ノ上", "下北沢"]; // スタンプの順番

  stations.sort((a, b) => {
  const ia = order.indexOf(a.name);
  const ib = order.indexOf(b.name);
  if (ia === -1) return 1;  // 未定義のものは最後に
  if (ib === -1) return -1;
  return ia - ib;
});

  const container = document.getElementById("container");
  let obtained = 0;
  
  const filteredStations = stations.filter(s => s.lineNo.includes(targetLine));
const breakPoints = [
  { index: 11, label: "高尾線" },
  { index: 12, label: "動物園線" },
  { index: 13, label: "相模線" },
  { index: 16, label: "井の頭線" }
]; //indexは1以上の整数

for (let i = 0; i < filteredStations.length; i++) {
  const station = filteredStations[i];
  if (!station.lineNo.includes(targetLine)) continue;

    const div = document.createElement("div");
    div.className = "station";

    // 画像
    const imgDiv = document.createElement("div");
    imgDiv.className = "stamp-image";

    // ラベル
    const labelDiv = document.createElement("div");
    labelDiv.className = "stamp-label";
    labelDiv.textContent = station.name;

    div.appendChild(imgDiv);
    div.appendChild(labelDiv);
    div.onclick = () => {
      window.location.href = `station.html?code=${station.code}`;
    };
    container.appendChild(div);

    const imagePath = `images/${station.code}.jpg`;
    try {
      const imgCheck = await fetch(imagePath);
      if (imgCheck.ok) {
        imgDiv.style.backgroundImage = `url(${imagePath})`;
        imgDiv.classList.add("unlocked");
        obtained++;
      }
    } catch(e) {}
  const bp = breakPoints.find(b => b.index === i + 1);
  if (bp) {
    const separator = document.createElement("div");
    separator.textContent = bp.label;
    separator.style.gridColumn = "1 / -1"; // 全幅に
    separator.style.textAlign = "left";
    separator.style.fontWeight = "bold";
    separator.style.margin = "10px 0";
    container.appendChild(separator);
  }
}
  const statusDiv = document.getElementById("status");
  statusDiv.textContent = `取得数: ${obtained} / ${stations.filter(s => s.lineNo.includes(targetLine)).length}`;
}

// 両方呼び出す
loadLines();
loadStations();

</script>

<button id="backBtn" style="margin:15px; padding:8px 16px; cursor:pointer;">
  ← 戻る
</button>
<script>
  document.getElementById("backBtn").onclick = () => {
  // 元のスタンプ帳ページに戻る
  window.history.back(); // 直前のページに戻る
};
</script>
</body>
</html>
